name: d2ybank
description: D2YBank — Enterprise Banking Super App
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.1.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  rxdart: ^0.28.0
  get_it: ^8.0.3
  go_router: ^15.1.2
  dio: ^5.8.0+1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  dartz: ^0.10.1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5
  sqflite: ^2.4.2
  path: ^1.9.1
  easy_localization: ^3.0.7+1
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1
  device_info_plus: ^11.5.0
  permission_handler: ^12.0.0+1
  internet_connection_checker: ^3.0.1
  path_provider: ^2.1.5
  flutter_local_notifications: ^19.3.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  share_plus: ^11.0.0
  collection: ^1.19.1
  timeago: ^3.7.1
  crypto: ^3.0.3
  keyboard_dismisser: ^3.0.0
  formz: ^0.6.1
  app_links: ^6.4.0
  local_auth: ^2.3.0
  camera: ^0.12.0+1
  google_mlkit_face_detection: ^0.13.2
  calendar_date_picker2: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/icons/svg/
    - assets/icons/png/
    - assets/images/png/
    - assets/images/svg/
    - assets/translations/
    - .env
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Bold.ttf
          weight: 700
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans/DMSans-Bold.ttf
          weight: 700
